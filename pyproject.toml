[project]
name = "ssl_simulator"
version = "0.0.3"
description = "Swarm Systems Lab Python Simulator"
readme = "README.md"
requires-python = ">=3.8, <3.12"
license = "GPL-3.0-or-later"
authors = [
    { name="Jesús Bautista Villar", email="jesbauti20@gmail.com" }
]

# Required dependencies
dependencies = [
    "numpy>=1.23",
    "matplotlib>=3.7",
    "matplotlib-inline>=0.1.6,<0.3",
    "tqdm>=4.50,<5.0",
    "pandas>=1.5",
    "scipy>=1.5,<2.1"
]

[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
exclude = ["tests", "examples"]

[tool.pytest.ini_options]
testpaths = ["tests"]