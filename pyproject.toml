[project]
name = "ssl_simulator"
version = "0.0.3"
description = "Swarm Systems Lab Python Simulator"
readme = "README.md"
requires-python = ">=3.8"
license = "GPL-3.0-or-later"
authors = [
    { name="Jesús Bautista Villar", email="jesbauti20@gmail.com" }
]

dependencies = [
    "numpy>=1.23",
    "tqdm>=4.50",
    "pandas>=1.5",
    "scipy>=1.5",
    "lieplusplus_py @ git+https://github.com/Swarm-Systems-Lab/lieplusplus_py.git@master"
]

[project.optional-dependencies]
examples = [
    "matplotlib>=3.7",
    "matplotlib-inline>=0.1.6,<0.3",
]

[build-system]
requires = [
    "setuptools>=61.0", 
    "wheel"
]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
exclude = ["tests", "examples"]

[tool.pytest.ini_options]
testpaths = ["tests"]