name: "Install system build dependencies"
description: "Composite action to install common system build dependencies on Ubuntu runners"
runs:
  using: "composite"
  steps:
    - name: Update apt and install build dependencies
      shell: bash
      run: |
        sudo apt-get update
        DEBIAN_FRONTEND=noninteractive sudo apt-get install -y \
          build-essential \
          cmake \
          ninja-build \
          pkg-config \
          python3-dev

    - name: Prepare Python environment
      shell: bash
      run: |
        ./scripts/ci/setup-env.sh
