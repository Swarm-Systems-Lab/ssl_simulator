site_name: ssl_simulator
site_description: "⚠️ Warning: This project is a work in progress and uses Generative AI for both documentation and code generation. Swarm Systems Lab Python Simulator"
site_author: Jesús Bautista Villar
copyright: Copyright &copy; 2024 Jesús Bautista Villar

repo_url: https://github.com/Swarm-Systems-Lab/ssl_simulator

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to system preference

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.arithmatex:
      generic: true
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.min.js
  - https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            heading_level: 2
            show_submodules: true
            show_root_toc_entry: true
            allow_inspection: true

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Usage: usage.md
  - API Reference: api.md
  - Golden path: golden-path.md
  - Contributing: contributing.md
  - Troubleshooting: troubleshooting.md
